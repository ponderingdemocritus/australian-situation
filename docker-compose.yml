services:
  postgres:
    image: postgres:16-alpine
    container_name: aus-dash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-aus_dash}
      PGDATA: /var/lib/postgresql/data/pgdata-${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - aus_dash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-aus_dash}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    container_name: aus-dash-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - aus_dash_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  aus_dash_postgres_data:
  aus_dash_redis_data:
