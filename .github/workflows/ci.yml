name: CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "bun.lock"
      - "run-all.sh"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - master
    paths:
      - "apps/**"
      - "packages/**"
      - "tests/**"
      - "package.json"
      - "bun.lock"
      - "run-all.sh"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aus_dash
        options: >-
          --health-cmd "pg_isready -U postgres -d aus_dash"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Restore Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lock', 'apps/web/package.json', 'packages/ui/package.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: tests/e2e
        run: bunx playwright install --with-deps chromium

      - name: Run repo validation
        run: bun run validate

      - name: Run Postgres validation
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/aus_dash
        run: bun run test:postgres

      - name: Run real browser flow
        run: bun run test:e2e:real
